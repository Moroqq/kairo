<!-- @dsCard group="Brand" viewport="700x200" name="Logo" subtitle="Glowing green k on dark rounded-square" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 24px; display:flex; gap: 32px; align-items:center; }
  .lbl { font-family: var(--font-mono); font-size: 10px; margin-top: 10px; color: var(--text-muted); text-align:center; }
  .wordmark { font-family: var(--font-mono); font-weight: 700; font-size: 34px; letter-spacing: 2px; color: var(--accent); text-shadow: 0 0 12px var(--accent-glow); }
</style>
</head>
<body>
  <div style="text-align:center">
    <img src="../../assets/kairo-mark.png" width="96" height="96" alt="Kairo logo" style="display:block;filter:drop-shadow(0 0 12px var(--accent-glow))">
    <div class="lbl">logomark · 96px</div>
  </div>
  <div style="text-align:center">
    <div style="display:flex;align-items:center;gap:14px">
      <img src="../../assets/kairo-mark.png" width="48" height="48" alt="" style="filter:drop-shadow(0 0 8px var(--accent-glow))">
      <span class="wordmark">KAIRO</span>
    </div>
    <div class="lbl">transparent mark + wordmark lockup</div>
  </div>
</body>
</html>
