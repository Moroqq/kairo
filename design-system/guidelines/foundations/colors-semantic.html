<!-- @dsCard group="Colors" viewport="700x150" name="Semantic" subtitle="success · warning · danger · info" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 18px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; }
  .chip { height: 64px; border: 1px solid var(--border); }
  .lbl { font-family: var(--font-mono); font-size: 10px; margin-top: 6px; color: var(--text-secondary); }
  .val { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--success)"></div><div class="lbl">--success</div><div class="val">#00FF41</div></div>
    <div class="sw"><div class="chip" style="background:var(--warning)"></div><div class="lbl">--warning</div><div class="val">#FFD400</div></div>
    <div class="sw"><div class="chip" style="background:var(--danger)"></div><div class="lbl">--danger</div><div class="val">#FF003C</div></div>
    <div class="sw"><div class="chip" style="background:var(--info)"></div><div class="lbl">--info</div><div class="val">#00E5FF</div></div>
  </div>
</body>
</html>
