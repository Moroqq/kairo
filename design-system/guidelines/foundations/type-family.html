<!-- @dsCard group="Type" viewport="700x170" name="Monospace stack" subtitle="One family runs the whole UI — JetBrains Mono" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 20px; }
  .big { font-family: var(--font-mono); font-size: 30px; font-weight: 700; color: var(--text-bright); letter-spacing: -0.02em; }
  .stack { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 10px; }
  .specimen { font-family: var(--font-mono); font-size: 13px; color: var(--text-primary); margin-top: 8px; }
  .specimen .dim { color: var(--text-dim); }
</style>
</head>
<body>
  <div class="big">JetBrains&nbsp;Mono</div>
  <div class="stack">var(--font-mono) → "JetBrains Mono", "Fira Code", "IBM Plex Mono", monospace · ligatures off</div>
  <div class="specimen"><span class="dim">$</span> ABCDEFGHIJ abcdefghij 0123456789 — задачи · сделано · 00:42</div>
  <div class="specimen"><span class="dim">// </span>!@#$%^&amp;*()[]{}&lt;&gt;/\|=+-_ → terminal punctuation reads cleanly</div>
</body>
</html>
