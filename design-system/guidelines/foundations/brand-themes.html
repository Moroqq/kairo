<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 18px; }
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .t { border: 1px solid var(--border-subtle); }
  .sw { display:flex; height: 34px; }
  .sw span { flex: 1; }
  .nm { font-family: var(--font-mono); font-size: 9px; padding: 4px 6px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="t"><div class="sw"><span style="background:#000"></span><span style="background:#00FF41"></span><span style="background:#D6F5D6"></span></div><div class="nm">MATRIX ·default</div></div>
    <div class="t"><div class="sw"><span style="background:#0B1220"></span><span style="background:#4DA3FF"></span><span style="background:#E6EDF7"></span></div><div class="nm">COMMAND</div></div>
    <div class="t"><div class="sw"><span style="background:#0C0C10"></span><span style="background:#A78BFA"></span><span style="background:#E8E6F0"></span></div><div class="nm">OBSIDIAN</div></div>
    <div class="t"><div class="sw"><span style="background:#F6F6F3"></span><span style="background:#2563EB"></span><span style="background:#1A1A1A"></span></div><div class="nm">PAPER</div></div>
    <div class="t"><div class="sw"><span style="background:#2E3440"></span><span style="background:#88C0D0"></span><span style="background:#ECEFF4"></span></div><div class="nm">NORD</div></div>
    <div class="t"><div class="sw"><span style="background:#0A0606"></span><span style="background:#E5484D"></span><span style="background:#E8B54A"></span></div><div class="nm">SAMURAI</div></div>
    <div class="t"><div class="sw"><span style="background:#F5F4EE"></span><span style="background:#D97757"></span><span style="background:#3D3D3A"></span></div><div class="nm">CLAUDE ·soft</div></div>
    <div class="t"><div class="sw"><span style="background:#262624"></span><span style="background:#D97757"></span><span style="background:#ECEAE3"></span></div><div class="nm">CLAUDE NOIR</div></div>
  </div>
</body>
</html>
