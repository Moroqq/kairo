<!-- @dsCard group="Type" viewport="700x190" name="Weights & tracking" subtitle="Wide tracking on labels, tight on numerals" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 18px; font-family: var(--font-mono); font-size: 14px; color: var(--text-primary); }
  .line { display:flex; align-items:baseline; gap: 16px; padding: 4px 0; }
  .line .tok { font-size: 10px; color: var(--text-dim); min-width: 200px; }
</style>
</head>
<body>
  <div class="line"><span class="tok">400 regular</span><span style="font-weight:400">обычный вес — тело текста</span></div>
  <div class="line"><span class="tok">500 medium</span><span style="font-weight:500">средний — строки задач</span></div>
  <div class="line"><span class="tok">600 semibold</span><span style="font-weight:600">полужирный — заголовки</span></div>
  <div class="line"><span class="tok">700 bold · tracking 2px</span><span style="font-weight:700;letter-spacing:2px;color:var(--text-bright)">KAIRO</span></div>
  <div class="line"><span class="tok">uppercase · tracking 1.5px</span><span style="font-weight:700;letter-spacing:1.5px;text-transform:uppercase;font-size:11px;color:var(--text-bright)">очередь</span></div>
</body>
</html>
