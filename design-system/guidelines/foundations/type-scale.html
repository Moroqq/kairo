<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 18px; font-family: var(--font-mono); }
  .line { display:flex; align-items:baseline; gap: 16px; padding: 3px 0; }
  .line .tok { font-size: 10px; color: var(--text-dim); min-width: 150px; }
  .line .ex { color: var(--text-primary); }
</style>
</head>
<body>
  <div class="line"><span class="tok">--text-2xl · 22</span><span class="ex" style="font-size:22px;color:var(--text-bright);font-weight:700">003 активных</span></div>
  <div class="line"><span class="tok">--text-xl · 17</span><span class="ex" style="font-size:17px;font-weight:600">пятница, 18 июня</span></div>
  <div class="line"><span class="tok">--text-lg · 15</span><span class="ex" style="font-size:15px;font-weight:600">Заголовок секции</span></div>
  <div class="line"><span class="tok">--text-md · 13</span><span class="ex" style="font-size:13px">строка задачи · в работе</span></div>
  <div class="line"><span class="tok">--text-sm · 12 (base)</span><span class="ex" style="font-size:12px">основной текст интерфейса</span></div>
  <div class="line"><span class="tok">--text-xs · 11</span><span class="ex" style="font-size:11px;color:var(--text-secondary)">метки и mono по умолчанию</span></div>
  <div class="line"><span class="tok">--text-2xs · 9</span><span class="ex" style="font-size:9px;color:var(--text-dim)">создано 2ч назад</span></div>
</body>
</html>
