<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px grid — UI runs dense" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 18px; font-family: var(--font-mono); }
  .line { display:flex; align-items:center; gap: 14px; padding: 3px 0; }
  .tok { font-size: 10px; color: var(--text-dim); min-width: 150px; }
  .bar { height: 14px; background: var(--accent-dim); border: 1px solid var(--border); }
</style>
</head>
<body>
  <div class="line"><span class="tok">--space-2 · 4px</span><div class="bar" style="width:4px"></div></div>
  <div class="line"><span class="tok">--space-3 · 6px</span><div class="bar" style="width:6px"></div></div>
  <div class="line"><span class="tok">--space-4 · 8px</span><div class="bar" style="width:8px"></div></div>
  <div class="line"><span class="tok">--space-5 · 12px</span><div class="bar" style="width:12px"></div></div>
  <div class="line"><span class="tok">--space-6 · 16px</span><div class="bar" style="width:16px"></div></div>
  <div class="line"><span class="tok">--space-7 · 24px</span><div class="bar" style="width:24px"></div></div>
  <div class="line"><span class="tok">--space-8 · 32px</span><div class="bar" style="width:32px"></div></div>
  <div class="line"><span class="tok">--space-9 · 48px</span><div class="bar" style="width:48px"></div></div>
</body>
</html>
