<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 20px; background: var(--bg-base); }
  .grp { margin-bottom: 18px; }
  .h { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; max-width: 320px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Toast, Spinner, LoadingDots, Modal, Button } = window.KairoDesignSystem_6fc2cc;
  function Demo() {
    const [open, setOpen] = React.useState(false);
    return (
      <>
        <div className="grp">
          <div className="h">Toast</div>
          <div className="col">
            <Toast type="success">задача создана</Toast>
            <Toast type="error" onClose={()=>{}}>не удалось сохранить</Toast>
            <Toast type="info">синхронизация…</Toast>
          </div>
        </div>
        <div className="grp">
          <div className="h">Spinner · LoadingDots · Modal</div>
          <div className="row">
            <Spinner size={22} />
            <LoadingDots />
            <Button variant="primary" onClick={()=>setOpen(true)}>открыть диалог</Button>
          </div>
        </div>
        <Modal open={open} onClose={()=>setOpen(false)} title="режим оформления" width={360}>
          <div style={{padding:14,fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text-secondary)'}}>
            модальное окно с терминальным заголовком и неоновой рамкой.
          </div>
        </Modal>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
